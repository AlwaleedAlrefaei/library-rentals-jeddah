services:
  jupyter:
    build: .
    image: library-rentals-jeddah:latest
    container_name: rentals-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./src:/app/src
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    command: >
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser
      --allow-root --NotebookApp.token='' --NotebookApp.password=''

  train:
    build: .
    image: library-rentals-jeddah:latest
    container_name: rentals-train
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    command: ["python", "-m", "src.train", "--data", "data/jeddah_library_rentals.csv"]
